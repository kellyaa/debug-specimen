apiVersion: apps/v1
kind: Deployment
metadata:
  name: debug-specimen
  labels:
    app: debug-specimen
spec:
  replicas: 1
  selector:
    matchLabels:
      app: debug-specimen
  template:
    metadata:
      labels:
        app: debug-specimen
    spec:
      containers:
        - name: debug-specimen
          image: ghcr.io/kellyaa/debug-specimen:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
